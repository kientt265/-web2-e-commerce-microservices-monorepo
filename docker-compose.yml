      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cart-db:5432/cart_db?schema=public
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      - PRISMA_SEED=false
    depends_on:
      - cart-db
    volumes:
      - ./back/cart-service:/app
      - /app/node_modules
    command: npm run dev
