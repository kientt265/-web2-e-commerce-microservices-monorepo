      context: ./back/inventory-service
      dockerfile: Dockerfile
    env_file:
      - ./back/inventory-service/.env
    ports: 
      - "3005:3001"
    environment:
      - INVENTORY_PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@inventory-db:5432/inventory_db?schema=public
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      - PRISMA_SEED=false
      - KAFKA_BROKER_1=kafka-1:9092
      - KAFKA_BROKER_2=kafka-2:9092
    depends_on:
      - inventory-db
