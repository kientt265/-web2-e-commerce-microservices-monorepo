  rating-service:
    build:
      context: ./back/rating-service
      dockerfile: Dockerfile
    env_file:
      - ./back/rating-service/.env
    ports: 
      - "3007:3001"
    environment:
      - RATING_PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@rating-db:5432/rating_db?schema=public
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      - PRISMA_SEED=false
    depends_on:
