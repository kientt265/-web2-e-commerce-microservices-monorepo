services:
  auth-service:
    build:
      context: ./back/auth-service
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      - AUTH_PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/auth_db?schema=public
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      # set true if you want to seed on container start
      - PRISMA_SEED=false
    depends_on:
      - auth-db
    volumes:
      - ./back/auth-service:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - app-network

  auth-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=auth_db
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - app-network

volumes: 
  auth-db-data:

networks:
  app-network:
    driver: bridge