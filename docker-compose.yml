    ports: 
      - "3006:3001"
    environment:
      - DELIVERY_PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@delivery-db:5432/delivery_db?schema=public
      - PRISMA_CLIENT_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
      - PRISMA_SEED=false
    depends_on:
      - delivery-db
    volumes:
